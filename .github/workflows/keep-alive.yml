name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "https://mkqymfnsommkvsppokmy.supabase.co/rest/v1/gastos?select=id&limit=1"
